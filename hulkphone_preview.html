<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HulkPhone — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════
   HulkPhone CSS — Neon Green "Hulk" Theme
   ════════════════════════════════════════════════════════════════ */
:root {
    --hulk-green:     #39ff14;
    --hulk-green-dim: #1adb00;
    --hulk-green-dk:  #0a5c00;
    --hulk-amber:     #ffcc00;
    --hulk-blue:      #00cfff;
    --hulk-red:       #ff2d2d;
    --bg-void:        #060c06;
    --bg-panel:       #0d1a0d;
    --bg-panel-2:     #111f11;
    --border:         rgba(57, 255, 20, 0.22);
    --border-bright:  rgba(57, 255, 20, 0.55);
    --text-bright:    #e8ffe8;
    --text-dim:       #5a8a5a;
    --font-display:   'Rajdhani', sans-serif;
    --font-mono:      'Share Tech Mono', monospace;
    --glow-sm:   0 0 6px rgba(57,255,20,0.6);
    --glow-md:   0 0 14px rgba(57,255,20,0.8), 0 0 30px rgba(57,255,20,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100%;background:#030803;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);padding:20px;}

body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:999;}

#hulkphone-wrapper{width:320px;background:var(--bg-panel);border:1px solid var(--border-bright);border-radius:8px;box-shadow:0 0 0 1px rgba(57,255,20,0.08),0 0 30px rgba(57,255,20,0.18),0 0 80px rgba(57,255,20,0.06),inset 0 1px 0 rgba(57,255,20,0.12);overflow:hidden;position:relative;animation:phoneIn .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes phoneIn{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

#hp-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;background:linear-gradient(180deg,#0f220f 0%,var(--bg-panel) 100%);border-bottom:1px solid var(--border);}
#hp-logo{display:flex;align-items:center;gap:8px;}
.hp-logo-icon{font-size:20px;animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 4px rgba(57,255,20,.5))}50%{filter:drop-shadow(0 0 12px rgba(57,255,20,1))}}
.hp-logo-text{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:3px;color:var(--hulk-green);text-shadow:var(--glow-sm);}
.hp-logo-text em{font-style:normal;color:var(--text-bright);text-shadow:none;}
.status-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.2);transition:background .4s,box-shadow .4s;}
.status-dot.unregistered{background:#555;box-shadow:none;}
.status-dot.registered{background:var(--hulk-green);box-shadow:0 0 8px var(--hulk-green),0 0 20px rgba(57,255,20,.5);animation:dot-pulse 2s ease-in-out infinite;}
.status-dot.incall{background:var(--hulk-amber);box-shadow:0 0 8px var(--hulk-amber),0 0 20px rgba(255,204,0,.5);animation:dot-pulse .8s ease-in-out infinite;}
.status-dot.ringing{background:var(--hulk-blue);box-shadow:0 0 8px var(--hulk-blue);animation:dot-pulse .4s ease-in-out infinite;}
@keyframes dot-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.7}}

#hp-status-bar{background:var(--bg-void);padding:6px 16px;border-bottom:1px solid var(--border);text-align:center;}
#hp-status-text{font-family:var(--font-mono);font-size:11px;letter-spacing:3px;color:var(--text-dim);transition:color .4s,text-shadow .4s;}
#hp-status-text.registered{color:var(--hulk-green);text-shadow:var(--glow-sm);}
#hp-status-text.incall{color:var(--hulk-amber);text-shadow:0 0 6px var(--hulk-amber);}
#hp-status-text.ringing{color:var(--hulk-blue);text-shadow:0 0 6px var(--hulk-blue);animation:blink .6s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

#hp-info-row{display:flex;justify-content:space-between;padding:8px 14px;background:var(--bg-panel-2);border-bottom:1px solid var(--border);gap:4px;}
.hp-info-item{display:flex;flex-direction:column;align-items:center;flex:1;}
.hp-info-label{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:2px;text-transform:uppercase;}
.hp-info-value{font-family:var(--font-mono);font-size:12px;color:var(--hulk-green);letter-spacing:1px;text-shadow:var(--glow-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
#hp-timer{color:var(--hulk-amber);text-shadow:0 0 6px var(--hulk-amber);font-size:13px;font-weight:bold;}

#hp-dial-display-wrap{display:flex;align-items:center;gap:6px;padding:10px 14px 8px;background:var(--bg-panel);}
#hp-dial-input{flex:1;background:var(--bg-void);border:1px solid var(--border);border-radius:4px;color:var(--hulk-green);font-family:var(--font-mono);font-size:18px;letter-spacing:3px;padding:6px 10px;outline:none;text-align:center;caret-color:var(--hulk-green);box-shadow:inset 0 0 10px rgba(0,0,0,.5);transition:border-color .2s,box-shadow .2s;}
#hp-dial-input::placeholder{color:var(--text-dim);font-size:12px;letter-spacing:1px;}
#hp-dial-input:focus{border-color:var(--hulk-green);box-shadow:var(--glow-sm),inset 0 0 10px rgba(0,0,0,.5);}
#hp-clear-btn{background:rgba(57,255,20,.06);border:1px solid var(--border);border-radius:4px;color:var(--hulk-green);font-size:16px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,box-shadow .2s;}
#hp-clear-btn:hover{background:rgba(57,255,20,.12);box-shadow:var(--glow-sm);}

#hp-dialpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 14px;background:var(--bg-panel);}
.hp-key{background:var(--bg-panel-2);border:1px solid var(--border);border-radius:6px;padding:8px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;overflow:hidden;transition:background .12s,border-color .12s,box-shadow .12s,transform .08s;user-select:none;}
.hp-key::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(57,255,20,.07),transparent 70%);pointer-events:none;}
.hp-key:hover{background:rgba(57,255,20,.08);border-color:var(--hulk-green-dim);box-shadow:var(--glow-sm);}
.hp-key:active{transform:scale(.93);background:rgba(57,255,20,.18);box-shadow:var(--glow-md);}
.hp-key-num{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--text-bright);line-height:1;}
.hp-key-alpha{font-family:var(--font-mono);font-size:7px;letter-spacing:1.5px;color:var(--text-dim);line-height:1;}

#hp-controls{display:grid;grid-template-columns:2fr 1fr 1fr;gap:6px;padding:6px 14px 8px;background:var(--bg-panel);}
.hp-ctrl-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;border-radius:6px;border:1px solid transparent;cursor:pointer;font-family:var(--font-display);font-weight:700;letter-spacing:1px;transition:background .18s,box-shadow .18s,transform .08s,border-color .18s;user-select:none;position:relative;overflow:hidden;}
.hp-ctrl-btn::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.05),transparent 70%);pointer-events:none;}
.hp-ctrl-btn:active{transform:scale(.95);}
.hp-ctrl-btn.green{background:linear-gradient(180deg,#0d3a0d,#071a07);border-color:var(--hulk-green-dim);color:var(--hulk-green);}
.hp-ctrl-btn.green:hover{background:linear-gradient(180deg,#145c14,#0a2a0a);box-shadow:var(--glow-md);border-color:var(--hulk-green);}
.hp-ctrl-btn.green.active-call{background:linear-gradient(180deg,#3a0d0d,#1a0707);border-color:var(--hulk-red);color:var(--hulk-red);box-shadow:0 0 10px rgba(255,45,45,.4);}
.hp-ctrl-btn.amber{background:linear-gradient(180deg,#2a2100,#110d00);border-color:rgba(255,204,0,.3);color:var(--hulk-amber);}
.hp-ctrl-btn.amber:hover{box-shadow:0 0 10px rgba(255,204,0,.4);border-color:var(--hulk-amber);}
.hp-ctrl-btn.amber.active{background:linear-gradient(180deg,#3d3000,#1a1400);border-color:var(--hulk-amber);box-shadow:0 0 12px rgba(255,204,0,.6);}
.hp-ctrl-btn.blue{background:linear-gradient(180deg,#002a33,#001218);border-color:rgba(0,207,255,.3);color:var(--hulk-blue);}
.hp-ctrl-btn.blue:hover{box-shadow:0 0 10px rgba(0,207,255,.4);border-color:var(--hulk-blue);}
.hp-ctrl-btn.blue.active{background:linear-gradient(180deg,#004455,#001f2a);border-color:var(--hulk-blue);box-shadow:0 0 12px rgba(0,207,255,.6);}
.hp-ctrl-icon{font-size:16px;}
.hp-ctrl-label{font-size:9px;letter-spacing:1.5px;}

#hp-transfer-row{display:flex;gap:5px;align-items:center;padding:0 14px 8px;}
#hp-xfer-input{flex:1;background:var(--bg-void);border:1px solid var(--border);border-radius:4px;color:var(--text-bright);font-family:var(--font-mono);font-size:12px;padding:5px 8px;outline:none;min-width:0;}
#hp-xfer-input::placeholder{color:var(--text-dim);font-size:10px;}
#hp-xfer-input:focus{border-color:var(--hulk-green-dim);}
.hp-xfer-btn{font-family:var(--font-display);font-size:9px;font-weight:700;letter-spacing:1px;padding:5px 7px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:background .15s,box-shadow .15s;white-space:nowrap;}
.hp-xfer-btn.blind{background:rgba(57,255,20,.08);border-color:var(--border);color:var(--hulk-green);}
.hp-xfer-btn.blind:hover{background:rgba(57,255,20,.15);box-shadow:var(--glow-sm);}
.hp-xfer-btn.warm{background:rgba(0,207,255,.08);border-color:rgba(0,207,255,.2);color:var(--hulk-blue);}
.hp-xfer-btn.warm:hover{background:rgba(0,207,255,.14);box-shadow:0 0 8px rgba(0,207,255,.3);}

#hp-volume-row{display:flex;align-items:center;gap:8px;padding:0 14px 10px;}
.hp-vol-label{font-size:14px;filter:grayscale(.4);}
#hp-volume{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--hulk-green) 80%,var(--bg-panel-2) 80%);outline:none;cursor:pointer;}
#hp-volume::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--hulk-green);box-shadow:0 0 6px var(--hulk-green);cursor:pointer;}

#hp-footer{background:var(--bg-void);padding:6px 14px;border-top:1px solid var(--border);text-align:center;}
#hp-version{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;color:var(--text-dim);}

#hp-toast{position:absolute;top:10px;left:50%;transform:translateX(-50%) translateY(-60px);background:rgba(57,255,20,.15);border:1px solid var(--hulk-green);border-radius:4px;color:var(--hulk-green);font-family:var(--font-mono);font-size:10px;letter-spacing:1.5px;padding:5px 12px;white-space:nowrap;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:100;pointer-events:none;}
#hp-toast.show{transform:translateX(-50%) translateY(0);}

/* Demo banner */
#demo-note{font-family:'Share Tech Mono',monospace;color:#39ff14;text-align:center;font-size:11px;letter-spacing:2px;margin-bottom:18px;text-shadow:0 0 8px #39ff14;opacity:.7;}
</style>
</head>
<body>

<div>
<div id="demo-note">[ HULKPHONE PREVIEW — UI DEMO MODE ]</div>

<div id="hulkphone-wrapper">
    <div id="hp-header">
        <div id="hp-logo">
            <span class="hp-logo-icon">☎</span>
            <span class="hp-logo-text">HULK<em>PHONE</em></span>
        </div>
        <div id="hp-status-dot" class="status-dot registered"></div>
    </div>

    <div id="hp-status-bar">
        <span id="hp-status-text" class="registered">REGISTERED</span>
    </div>

    <div id="hp-info-row">
        <div class="hp-info-item">
            <span class="hp-info-label">Extension</span>
            <span class="hp-info-value" id="hp-ext-display">8601</span>
        </div>
        <div class="hp-info-item">
            <span class="hp-info-label">Server</span>
            <span class="hp-info-value" id="hp-server-display">192.168.1.10</span>
        </div>
        <div class="hp-info-item">
            <span class="hp-info-label">Timer</span>
            <span class="hp-info-value" id="hp-timer">00:00</span>
        </div>
    </div>

    <div id="hp-dial-display-wrap">
        <input type="text" id="hp-dial-input" placeholder="Enter number..." autocomplete="off" maxlength="20">
        <button id="hp-clear-btn" title="Clear" onclick="demoKey('DEL')">⌫</button>
    </div>

    <div id="hp-dialpad">
        <button class="hp-key" onclick="demoKey('1')"><span class="hp-key-num">1</span></button>
        <button class="hp-key" onclick="demoKey('2')"><span class="hp-key-num">2</span><span class="hp-key-alpha">ABC</span></button>
        <button class="hp-key" onclick="demoKey('3')"><span class="hp-key-num">3</span><span class="hp-key-alpha">DEF</span></button>
        <button class="hp-key" onclick="demoKey('4')"><span class="hp-key-num">4</span><span class="hp-key-alpha">GHI</span></button>
        <button class="hp-key" onclick="demoKey('5')"><span class="hp-key-num">5</span><span class="hp-key-alpha">JKL</span></button>
        <button class="hp-key" onclick="demoKey('6')"><span class="hp-key-num">6</span><span class="hp-key-alpha">MNO</span></button>
        <button class="hp-key" onclick="demoKey('7')"><span class="hp-key-num">7</span><span class="hp-key-alpha">PQRS</span></button>
        <button class="hp-key" onclick="demoKey('8')"><span class="hp-key-num">8</span><span class="hp-key-alpha">TUV</span></button>
        <button class="hp-key" onclick="demoKey('9')"><span class="hp-key-num">9</span><span class="hp-key-alpha">WXYZ</span></button>
        <button class="hp-key" onclick="demoKey('*')"><span class="hp-key-num">*</span></button>
        <button class="hp-key" onclick="demoKey('0')"><span class="hp-key-num">0</span><span class="hp-key-alpha">+</span></button>
        <button class="hp-key" onclick="demoKey('#')"><span class="hp-key-num">#</span></button>
    </div>

    <div id="hp-controls">
        <button id="hp-call-btn" class="hp-ctrl-btn green" onclick="demoCall()">
            <span class="hp-ctrl-icon">📞</span>
            <span class="hp-ctrl-label" id="hp-call-label">CALL</span>
        </button>
        <button id="hp-mute-btn" class="hp-ctrl-btn amber" onclick="demoMute()">
            <span class="hp-ctrl-icon">🎙</span>
            <span class="hp-ctrl-label" id="hp-mute-label">MUTE</span>
        </button>
        <button id="hp-hold-btn" class="hp-ctrl-btn blue" onclick="demoHold()">
            <span class="hp-ctrl-icon">⏸</span>
            <span class="hp-ctrl-label" id="hp-hold-label">HOLD</span>
        </button>
    </div>

    <div id="hp-transfer-row">
        <input type="text" id="hp-xfer-input" placeholder="Transfer to..." autocomplete="off">
        <button class="hp-xfer-btn blind">XFER (Blind)</button>
        <button class="hp-xfer-btn warm">Warm</button>
    </div>

    <div id="hp-volume-row">
        <span class="hp-vol-label">🔊</span>
        <input type="range" id="hp-volume" min="0" max="1" step="0.05" value="0.8">
    </div>

    <div id="hp-footer">
        <span id="hp-version">HulkPhone v1.0 | ViciDial WebRTC</span>
    </div>
</div><!-- /#hulkphone-wrapper -->
</div>

<script>
// ── Demo interactivity (no SIP.js needed for preview) ──────────
var callActive = false;
var muteActive = false;
var holdActive = false;
var timerInt = null;
var secs = 0;

function toast(msg) {
    var el = document.getElementById('hp-toast');
    if (!el) {
        el = document.createElement('div');
        el.id = 'hp-toast';
        document.getElementById('hulkphone-wrapper').appendChild(el);
    }
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

function setStatus(key) {
    var states = {
        REG:  { dot: 'registered', text: 'REGISTERED',   cls: 'registered' },
        CALL: { dot: 'incall',     text: 'IN CALL',       cls: 'incall' },
        RING: { dot: 'ringing',    text: 'RINGING...',    cls: 'ringing' },
        HOLD: { dot: 'onhold',     text: 'ON HOLD',       cls: 'onhold' },
    };
    var s = states[key];
    document.getElementById('hp-status-dot').className = 'status-dot ' + s.dot;
    var t = document.getElementById('hp-status-text');
    t.textContent = s.text;
    t.className = s.cls;
}

function demoKey(d) {
    var inp = document.getElementById('hp-dial-input');
    if (d === 'DEL') { inp.value = inp.value.slice(0,-1); return; }
    inp.value += d;
    if (callActive) toast('DTMF: ' + d);
}

function demoCall() {
    if (!callActive) {
        callActive = true;
        setStatus('RING');
        document.getElementById('hp-call-btn').classList.add('active-call');
        document.getElementById('hp-call-label').textContent = 'HANG UP';
        toast('RINGING...');
        setTimeout(function() {
            setStatus('CALL');
            startTimer();
        }, 1200);
    } else {
        callActive = false;
        setStatus('REG');
        document.getElementById('hp-call-btn').classList.remove('active-call');
        document.getElementById('hp-call-label').textContent = 'CALL';
        stopTimer();
        muteActive = false; holdActive = false;
        document.getElementById('hp-mute-btn').classList.remove('active');
        document.getElementById('hp-hold-btn').classList.remove('active');
        document.getElementById('hp-mute-label').textContent = 'MUTE';
        document.getElementById('hp-hold-label').textContent = 'HOLD';
        toast('CALL ENDED');
    }
}

function demoMute() {
    muteActive = !muteActive;
    document.getElementById('hp-mute-btn').classList.toggle('active', muteActive);
    document.getElementById('hp-mute-label').textContent = muteActive ? 'UNMUTE' : 'MUTE';
    toast(muteActive ? 'MUTED 🔇' : 'UNMUTED 🎙');
}

function demoHold() {
    holdActive = !holdActive;
    document.getElementById('hp-hold-btn').classList.toggle('active', holdActive);
    document.getElementById('hp-hold-label').textContent = holdActive ? 'RESUME' : 'HOLD';
    if (holdActive) setStatus('HOLD'); else setStatus('CALL');
    toast(holdActive ? 'ON HOLD ⏸' : 'RESUMED ▶');
}

function startTimer() {
    secs = 0;
    clearInterval(timerInt);
    timerInt = setInterval(function() {
        secs++;
        var m = Math.floor(secs/60).toString().padStart(2,'0');
        var s = (secs%60).toString().padStart(2,'0');
        document.getElementById('hp-timer').textContent = m+':'+s;
    }, 1000);
}

function stopTimer() {
    clearInterval(timerInt);
    document.getElementById('hp-timer').textContent = '00:00';
}
</script>
</body>
</html>
